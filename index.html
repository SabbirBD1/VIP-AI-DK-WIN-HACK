<script>
    // পাসওয়ার্ড আপডেট করা হয়েছে
    const PASS = "3XSabbir2026";
    let api = "", lastP = "", curBS = "", stepCount = 0;
    const bot = document.getElementById("diamond-bot");
    const mini = document.getElementById("mini-btn");
    
    function makeDraggable(el, handle) {
        let ox = 0, oy = 0;
        const move = (e) => {
            let cx = e.touches ? e.touches[0].clientX : e.clientX;
            let cy = e.touches ? e.touches[0].clientY : e.clientY;
            el.style.left = (cx - ox) + "px";
            el.style.top = (cy - oy) + "px";
        };
        handle.addEventListener('mousedown', (e) => {
            ox = e.clientX - el.offsetLeft;
            oy = e.clientY - el.offsetTop;
            document.addEventListener('mousemove', move);
        });
        handle.addEventListener('touchstart', (e) => {
            ox = e.touches[0].clientX - el.offsetLeft;
            oy = e.touches[0].clientY - el.offsetTop;
            document.addEventListener('touchmove', move);
        });
        document.addEventListener('mouseup', () => document.removeEventListener('mousemove', move));
        document.addEventListener('touchend', () => document.removeEventListener('touchmove', move));
    }
    
    makeDraggable(bot, document.getElementById("handle"));
    makeDraggable(mini, mini);
    
    function minimize() {
        bot.style.display = 'none';
        mini.style.display = 'flex';
        mini.style.left = bot.style.left;
        mini.style.top = bot.style.top;
    }
    function maximize() {
        bot.style.display = 'block';
        mini.style.display = 'none';
        bot.style.left = mini.style.left;
        bot.style.top = mini.style.top;
    }
    
    function unlock() {
        if(document.getElementById('passInput').value === PASS) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('signal-view').style.display = 'block';
        } else {
            alert("ভুল পাসওয়ার্ড! হ্যাকের পাসওয়ার্ড নিতে ইনবক্স করুন।");
        }
    }
    
    function start(mode) {
        document.getElementById('mode-select').style.display = 'none';
        document.getElementById('live-panel').style.display = 'block';
        api = (mode === '30S') ? 'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json?pageSize=30' : 'https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?pageSize=30';
        fetchData();
        setInterval(fetchData, 2500);
    }
    
    async function fetchData() {
        try {
            const r = await fetch(api);
            const d = await r.json();
            const latest = d.data.list[0];
            if(lastP !== latest.issueNumber) {
                const list = d.data.list.slice(0, 15);
                let realBS = parseInt(latest.number) >= 5 ? "BIG" : "SMALL";
                
                // ১/২ স্টেপ রিকভারি লজিক
                if(lastP) {
                    if(curBS === realBS) {
                        document.getElementById('pStatus').innerHTML = `STATUS: <span style="color:#00ff41">WIN 🐯 (S${stepCount+1})</span>`;
                        stepCount = 0;
                    } else {
                        stepCount++;
                        document.getElementById('pStatus').innerHTML = `STATUS: <span style="color:#ff003c">LOSS 🖤 (Next Step)</span>`;
                    }
                }
                
                // এডভান্সড অ্যালগরিদম (Trend Analysis)
                let bigCount = list.filter(x => parseInt(x.number) >= 5).length;
                let nextBS = (bigCount > 7) ? "SMALL" : (bigCount < 7) ? "BIG" : (parseInt(latest.number) >= 5 ? "SMALL" : "BIG");
                
                // মার্টিঙ্গেল প্রোটেকশন
                if(stepCount > 0) {
                    nextBS = (curBS === "BIG") ? "SMALL" : "BIG";
                }
                
                lastP = latest.issueNumber;
                curBS = nextBS;
                let nextColor = (curBS === "BIG") ? "GREEN" : "RED";
                
                document.getElementById('pID').innerText = (BigInt(latest.issueNumber) + 1n).toString();
                document.getElementById('pRes').innerText = curBS;
                document.getElementById('pRes').style.color = (curBS === "BIG") ? "#ffea00" : "#00ffcc";
                document.getElementById('pColor').innerHTML = `COLOR: <span style="color:${nextColor==='RED'?'#ff003c':'#00ff41'}">${nextColor}</span>`;
            }
        } catch(e) {}
    }
</script>
